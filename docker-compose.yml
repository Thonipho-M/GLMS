version: '3.9'

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: glms-sql
    environment:
      SA_PASSWORD: "YourStrong@Pass123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    networks:
      - glms-network

  glms-api:
    build:
      context: ./GLMS.API
      dockerfile: Dockerfile
    container_name: glms-api
    ports:
      - "5001:80"
    depends_on:
      - sqlserver
    networks:
      - glms-network
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  glms-mvc:
    build:
      context: ./GLMS.Web
      dockerfile: Dockerfile
    container_name: glms-mvc
    ports:
      - "5002:80"
    depends_on:
      - glms-api
    networks:
      - glms-network
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

networks:
  glms-network:
    driver: bridge